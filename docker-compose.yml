services:
  db:
    image: postgres:17
    container_name: database
    environment:
      POSTGRES_DB: chimer
      POSTGRES_USER: chimer_user
      POSTGRES_PASSWORD: chimer_passwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: ./dockerfile
    container_name: backend
    environment:
      EXPRESS_ENV: development
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: chimer
      DATABASE_USERNAME: chimer_user
      DATABASE_PASSWORD: chimer_passwd
    restart: no
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: ./dockerfile
    container_name: frontend
    environment:
      VITE_API_URL: http://localhost:3000
    restart: no
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
