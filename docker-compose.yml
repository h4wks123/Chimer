services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ./dockerfile
    container_name: frontend
    environment:
      VITE_API_URL: http://localhost:3000
    restart: no
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host

volumes:
  frontend_node_modules: