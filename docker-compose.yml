services:
  db:
    image: postgres:17
    container_name: database
    environment:
      POSTGRES_DB: chimer
      POSTGRES_USER: chimer_user
      POSTGRES_PASSWORD: chimer_passwd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "chimer_user", "-d", "chimer"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: ./dockerfile
    container_name: backend
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: chimer
      DATABASE_USERNAME: chimer_user
      DATABASE_PASSWORD: chimer_passwd
      BETTER_AUTH_URL: http://localhost:3000
      WEBSITE_URL: http://localhost:443
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    restart: no
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: ./dockerfile
      args:
        VITE_BETTER_AUTH_URL: http://localhost:3000
        VITE_WEBSITE_URL: http://localhost:443
        VITE_WEBSOCKET_URL: ws://localhost:3000
    environment:
      VITE_BETTER_AUTH_URL: http://localhost:3000
      VITE_WEBSITE_URL: http://localhost:443
      VITE_WEBSOCKET_URL: ws://localhost:3000
    container_name: frontend
    restart: no
    ports:
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: pnpm run dev

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules: